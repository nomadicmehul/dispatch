name: Publish to npm

on:
  push:
    tags:
      - 'v*' # Trigger on version tags like v1.0.0
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Dry run (build + pack only, no publish)'
        required: true
        default: true
        type: boolean

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Pack (dry run)
        if: ${{ github.event.inputs.dry-run == 'true' || github.event_name == 'workflow_dispatch' && github.event.inputs.dry-run == '' }}
        run: npm pack --dry-run

      - name: Publish to npm
        if: ${{ github.event_name == 'push' || github.event.inputs.dry-run == 'false' }}
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
